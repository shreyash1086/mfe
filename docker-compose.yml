version: '3.8'

services:
  # ── GATEWAY NGINX ────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: mfe-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - shell
      - shared-design-system
      - cloud-labs
      - dashboard
      - virtual-machine
      - cloud-console
      - logging
      - code-environment
      - code-module
      - content-uploading
      - assessment
    networks:
      - micro-net
    restart: unless-stopped

  # ── SHARED DESIGN SYSTEM ──────────────────────────────────────────────────
  shared-design-system:
    build:
      context: ./shared-design-system
      dockerfile: Dockerfile
    container_name: mfe-shared-design-system
    expose:
      - "80"
    networks:
      - micro-net
    restart: unless-stopped

  # ── MODULES ───────────────────────────────────────────────────────────────
  cloud-labs:
    build:
      context: .
      dockerfile: ./module-cloud-labs/Dockerfile
    container_name: mfe-cloud-labs
    expose:
      - "80"
    networks:
      - micro-net
    depends_on:
      - shared-design-system
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: ./module-dashboard/Dockerfile
    container_name: mfe-dashboard
    expose:
      - "80"
    networks:
      - micro-net
    depends_on:
      - shared-design-system
    restart: unless-stopped

  virtual-machine:
    build:
      context: .
      dockerfile: ./module-virtual-machine/Dockerfile
    container_name: mfe-virtual-machine
    expose:
      - "80"
    networks:
      - micro-net
    depends_on:
      - shared-design-system
    restart: unless-stopped

  cloud-console:
    build:
      context: .
      dockerfile: ./module-cloud-console/Dockerfile
    container_name: mfe-cloud-console
    expose:
      - "80"
    networks:
      - micro-net
    depends_on:
      - shared-design-system
    restart: unless-stopped

  logging:
    build:
      context: .
      dockerfile: ./module-logging/Dockerfile
    container_name: mfe-logging
    expose:
      - "80"
    networks:
      - micro-net
    depends_on:
      - shared-design-system
    restart: unless-stopped

  code-environment:
    build:
      context: .
      dockerfile: ./module-code-environment/Dockerfile
    container_name: mfe-code-environment
    expose:
      - "80"
    networks:
      - micro-net
    depends_on:
      - shared-design-system
    restart: unless-stopped

  code-module:
    build:
      context: .
      dockerfile: ./module-code-module/Dockerfile
    container_name: mfe-code-module
    expose:
      - "80"
    networks:
      - micro-net
    depends_on:
      - shared-design-system
    restart: unless-stopped

  content-uploading:
    build:
      context: .
      dockerfile: ./module-content-uploading/Dockerfile
    container_name: mfe-content-uploading
    expose:
      - "80"
    networks:
      - micro-net
    depends_on:
      - shared-design-system
    restart: unless-stopped

  assessment:
    build:
      context: .
      dockerfile: ./module-assessment/Dockerfile
    container_name: mfe-assessment
    expose:
      - "80"
    networks:
      - micro-net
    depends_on:
      - shared-design-system
    restart: unless-stopped

  # ── SHELL APP ─────────────────────────────────────────────────────────────
  shell:
    build:
      context: .
      dockerfile: ./shell-app/Dockerfile
    container_name: mfe-shell
    expose:
      - "80"
    networks:
      - micro-net
    depends_on:
      - shared-design-system
      - cloud-labs
      - dashboard
      - virtual-machine
      - cloud-console
      - logging
      - code-environment
      - code-module
      - content-uploading
      - assessment
    restart: unless-stopped

networks:
  micro-net:
    driver: bridge
    name: micro-frontend-network
