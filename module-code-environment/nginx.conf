server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── CORS headers ─────────────────────────────────────────────────────────
    # Required so the Shell container can fetch remoteEntry.js from this module.
    # Module Federation loads remote bundles cross-origin at runtime.
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

    # ── SPA fallback ─────────────────────────────────────────────────────────
    # All routes (except static files) serve index.html so React Router works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache static assets ──────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # ── remoteEntry.js — NEVER cache ─────────────────────────────────────────
    # This file is the Module Federation manifest. Shell checks it on every load.
    # Caching it would break updates — modules would serve stale component versions.
    location = /remoteEntry.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header 'Access-Control-Allow-Origin' '*' always;
        expires off;
    }
}
