worker_processes 1;

events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  server {
    listen 80;

    # ── Security Headers ──────────────────────────────────────────────────
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ── Shell (catch-all) ─────────────────────────────────────────────────
    location / {
      proxy_pass http://mfe-shell:80;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Shared Design System ─────────────────────────────────────────────
    location = /design-system-remote/remoteEntry.js {
      proxy_pass http://mfe-shared-design-system:80/remoteEntry.js;
      add_header Cache-Control "no-store, no-cache, must-revalidate" always;
      add_header 'Access-Control-Allow-Origin' '*' always;
    }
    location ~ ^/design-system-remote/.*\.(js|css|woff2?|png|jpg|svg)$ {
      rewrite ^/design-system-remote/(.*)$ /$1 break;
      proxy_pass http://mfe-shared-design-system:80;
      add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # ── Cloud Labs ────────────────────────────────────────────────────────
