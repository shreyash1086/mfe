<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyApp — Shell</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Poppins:wght@300;400;500;600;700&family=Syne:wght@600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body>
  <div id="root"></div>
  <script>
    // Runtime remote config: can be overridden by environment injection (nginx, runtime script)
    // Smart detection: In Docker, use internal service names; in dev, use localhost ports
    // Current origin detection: if running on port 3000 (dev), assume localhost ports
    // If running on port 80 (Docker via nginx), use Docker service names
    function getRemoteConfig() {
      const port = window.location.port || (window.location.protocol === 'https:' ? '443' : '80');
      const isDocker = port === '80' || port === '443';

      if (isDocker) {
        // Docker environment: use service names from docker-compose
        // Accessing services on the same Docker network by container name
        return {
          cloud_labs: 'http://cloud-labs/remoteEntry.js',
          dashboard: 'http://dashboard/remoteEntry.js',
          virtual_machine: 'http://virtual-machine/remoteEntry.js'
        };
      } else {
        // Local dev environment
        return {
          cloud_labs: 'http://localhost:3001/remoteEntry.js',
          dashboard: 'http://localhost:3002/remoteEntry.js',
          virtual_machine: 'http://localhost:3003/remoteEntry.js'
        };
      }
    }

    window.__RUNTIME_REMOTE_CONFIG__ = window.__RUNTIME_REMOTE_CONFIG__ || getRemoteConfig();
  </script>
</body>

</html>
